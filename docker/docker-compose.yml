services:
  kanban-dev:
    build:
      context: .
    container_name: kanban-dev
    network_mode: host
    user: max
    volumes:
      - /home/ubuntu/workspace:/home/max/workspace
    restart: always
    environment:
      - NODE_ENV=production
    command: ['/bin/bash', '-lc', 'npx --yes kanban@latest --host 0.0.0.0 --port 3484']
